<script>
const favButtons = document.querySelectorAll(".fav-btn");
const favContainer = document.getElementById("fav-items");

// Load saved favorites
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
renderFavorites();

favButtons.forEach(btn => {
    btn.addEventListener("click", () => {
        const imgSrc = btn.previousElementSibling.src;

        if (favorites.includes(imgSrc)) {
            favorites = favorites.filter(item => item !== imgSrc);
            btn.classList.remove("active");
            btn.textContent = "♡";
        } else {
            favorites.push(imgSrc);
            btn.classList.add("active");
            btn.textContent = "❤️";
        }

        localStorage.setItem("favorites", JSON.stringify(favorites));
        renderFavorites();
    });
});

function renderFavorites() {
    favContainer.innerHTML = "";
    favorites.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        favContainer.appendChild(img);
    });
}
</script>
